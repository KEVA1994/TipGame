name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'TipGame.Blazor/**'
      - 'TipGame.Shared/**'
      - 'TipGame.Domain/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish TipGame.Blazor/TipGame.Blazor.csproj -c Release -o output

      - name: Update base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/TipGame/" />|g' output/wwwroot/index.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
