name: Send final standings email

# Drains the EmailRequests queue (kind=final_standings): admins queue a
# request from the app's Admin page, this runs every 15 minutes and sends it.
# The request's ProcessedAt column is the dedup guard — each competition's
# final-standings mail goes out exactly once, ever.
#
# Tip: run manually with only_email set to your own address to preview
# whatever's currently queued — that run does NOT mark requests as processed,
# so the real scheduled run still sends to everyone afterwards.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      only_email:
        description: 'Preview: only mail this address, and do not mark the request as sent. Leave empty for a normal (real) run.'
        type: string
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: scripts/send-final-standings
        run: npm ci

      - name: Send final standings
        working-directory: scripts/send-final-standings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REMINDER_FROM_ADDRESS: ${{ secrets.REMINDER_FROM_ADDRESS }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ONLY_EMAIL: ${{ inputs.only_email }}
        run: node index.mjs
