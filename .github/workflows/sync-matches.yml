name: Sync Matches

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      football_api_url:
        description: 'Football API URL (competition, date filters etc.)'
        required: false
        default: 'https://api.football-data.org/v4/competitions/PL/matches?dateFrom=2026-03-30&dateTo=2026-04-27'

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TipGame.DataMiner/TipGame.DataMiner.csproj

      - name: Run DataMiner
        env:
          Supabase__Url: ${{ secrets.SUPABASE_URL }}
          Supabase__Key: ${{ secrets.SUPABASE_KEY }}
          FootballApi__Token: ${{ secrets.FOOTBALL_API_TOKEN }}
          FootballApi__Url: ${{ inputs.football_api_url || 'https://api.football-data.org/v4/competitions/PL/matches?dateFrom=2026-03-30&dateTo=2026-04-27' }}
        run: dotnet run --project TipGame.DataMiner/TipGame.DataMiner.csproj
