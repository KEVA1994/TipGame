<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TipGame.Blazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script>
      // GitHub Pages SPA support: restore path after 404 redirect
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TipGame.Blazor.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <div class="app-loading">
            <span>⚽</span>
            <p>Loading…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        window._supabaseCreateClient = createClient;
    </script>
    <script src="js/realtime.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
